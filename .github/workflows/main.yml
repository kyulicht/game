# Tiny Tapeout project information
project:
  title:        "Tiny Space Invaders"
  author:       "kyu neushwastein"
  discord:      ""
  description:  " game style space invaders"
  language:     "Verilog"
  clock_hz:     25175000       # Standard VGA 640x480 clock

  tiles: "1x1"

  top_module:  "tt_um_shiho_space_invaders"

  source_files:
    - "tt_um_space_invaders.v"
    - "space_invaders.v"
    - "vga_sync.v"
    - "gamepad_pmod.v"

pinout:
  # Inputs
  ui[0]: "Unused"
  ui[1]: "Unused"
  ui[2]: "Unused"
  ui[3]: "Unused"
  ui[4]: "Gamepad LATCH"
  ui[5]: "Gamepad CLK"
  ui[6]: "Gamepad DATA"
  ui[7]: "Unused"

  # Outputs
  uo[0]: "R1"
  uo[1]: "G1"
  uo[2]: "B1"
  uo[3]: "VSYNC"
  uo[4]: "R0"
  uo[5]: "G0"
  uo[6]: "B0"
  uo[7]: "HSYNC"

  # Bidirectional pins
  uio[0]: ""
  uio[1]: ""
  uio[2]: ""
  uio[3]: ""
  uio[4]: ""
  uio[5]: ""
  uio[6]: ""
  uio[7]: ""

# Do not change!
yaml_version: 6
